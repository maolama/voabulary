<div x-show="dictionaryModalOpen" class="absolute inset-0 z-[300] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm" x-cloak>
    <div @click.away="closeDictionaryPopup()" x-transition.opacity x-transition:enter-start="scale-95" x-transition:enter-end="scale-100"
         class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl h-[85vh] flex flex-col m-4 overflow-hidden border border-slate-200 relative">
        
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0 shadow-sm z-10">
            <div class="flex items-center gap-1 md:gap-3">
                
                <button @click="historyStack.length > 0 ? goBackInHistory() : closeDictionaryPopup()" 
                        class="text-slate-500 hover:text-indigo-600 transition-colors p-2 hover:bg-indigo-100 rounded-full" 
                        title="Go Back">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </button>
                
                <span class="text-2xl hidden md:inline">📖</span>
                
                <div class="flex flex-col ml-1">
                    <form @submit.prevent="openWordMaster(selectedWord)" class="flex items-center gap-2 bg-white border border-slate-300 rounded px-2 py-0.5 shadow-inner focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500 transition-all">
                        <input type="text" x-model="selectedWord" class="font-black text-slate-800 text-lg md:text-xl tracking-tight bg-transparent border-none outline-none w-32 md:w-48 focus:ring-0 p-0 m-0">
                        <button type="submit" class="text-slate-400 hover:text-indigo-600 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </form>
                    <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mt-1">Mastery Hub</p>
                </div>
            </div>
            
            <button @click="closeDictionaryPopup()" class="bg-slate-200 hover:bg-rose-100 text-slate-500 hover:text-rose-600 w-10 h-10 rounded-full flex items-center justify-center transition-colors hidden md:flex">
                <span class="font-black text-lg">✕</span>
            </button>
        </div>

        <div class="flex bg-slate-100 border-b border-slate-200 shrink-0 px-6">
            <button @click="modalTab = 'dictionary'" :class="modalTab === 'dictionary' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-4 py-3 font-bold text-sm border-b-2 transition-colors flex items-center gap-2">
                📚 Dictionary
            </button>
            <button @click="modalTab = 'context'" :class="modalTab === 'context' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-4 py-3 font-bold text-sm border-b-2 transition-colors flex items-center gap-2">
                🌍 Real Context
            </button>
            <button @click="modalTab = 'collocations'" :class="modalTab === 'collocations' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-4 py-3 font-bold text-sm border-b-2 transition-colors flex items-center gap-2">
                🔗 Collocations
            </button>
        </div>
        
        <div class="flex-grow bg-slate-100 relative overflow-y-auto p-6">
            
            <div x-show="isModalLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-100/90 z-20 backdrop-blur-sm">
                <svg class="animate-spin h-10 w-10 text-indigo-600 mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-sm font-bold text-slate-500 animate-pulse">Consulting Empire Archives...</p>
            </div>

            <div x-show="modalTab === 'dictionary'" id="modal-dict-content"></div>

            <div x-show="modalTab === 'context'" class="space-y-4">
                <template x-if="contextData.sentences && contextData.sentences.length === 0">
                    <div class="text-center py-10 text-slate-400 font-bold">No academic sentences found for this word under the current filters.</div>
                </template>

                <template x-for="sent in contextData.sentences" :key="sent.id">
                    <div class="bg-white border border-slate-200 p-5 rounded-xl shadow-sm">
                        <p class="text-slate-800 text-lg font-serif mb-4 leading-relaxed" x-html="highlightWord(sent.text, sent.word_form)"></p>
                        
                        <div class="flex items-center justify-between border-t border-slate-100 pt-3">
                            <div class="flex items-center gap-2">
                                <span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border border-indigo-100" x-text="sent.exam_type"></span>
                                <span class="text-xs text-slate-500 font-medium" x-text="sent.section"></span>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <button @click="readFullPassage(sent.section_id, sent.id, sent.section)" class="text-xs font-bold text-slate-500 hover:text-indigo-600 flex items-center gap-1 transition-colors px-3 py-1 rounded bg-slate-50 hover:bg-indigo-50 border border-slate-200">
                                    📖 Read Passage
                                </button>
                                <button @click="stealSentence(sent.text, $event.target)" class="text-xs font-bold text-emerald-600 hover:text-emerald-700 flex items-center gap-1 transition-colors px-3 py-1 rounded bg-emerald-50 hover:bg-emerald-100 border border-emerald-200">
                                    ➕ Steal Sentence
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="modalTab === 'collocations'" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <template x-if="collocationData.length === 0">
                    <div class="col-span-full text-center py-10 text-slate-400 font-bold">No strong collocations found.</div>
                </template>

                <template x-for="(col, index) in collocationData" :key="index">
                    <div @click="openWordMaster(col.colloc_lemma)" 
                        class="bg-white border border-slate-200 rounded-lg p-4 cursor-pointer hover:border-indigo-400 hover:shadow-md transition-all group">
                        <div class="flex justify-between items-start">
                            <span class="font-black text-slate-800 text-lg group-hover:text-indigo-600 transition-colors" x-text="col.colloc_lemma"></span>
                            <span class="text-[10px] uppercase font-bold text-slate-400 bg-slate-100 px-1.5 rounded" x-text="col.colloc_pos"></span>
                        </div>
                        <div class="mt-2 text-xs text-slate-500 flex justify-between">
                            <span class="text-indigo-500 font-bold">Related</span>
                            <span class="font-bold text-slate-400" x-text="col.freq + ' uses'"></span>
                        </div>
                    </div>
                </template>
            </div>

        </div>
    </div>
</div>
