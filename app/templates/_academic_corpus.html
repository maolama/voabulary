<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[500px] relative">
    
    <div class="mb-6 pb-4 border-b border-slate-100 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">
                🎓 Authentic Usage
            </h2>
            <p class="text-slate-500 text-sm mt-1">Real sentences extracted directly from Cambridge and IELTS academic exams.</p>
        </div>
        
        <div class="flex items-center gap-3">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Filter by Exam:</label>
            <select x-model="corpusFilter" @change="fetchCorpus(1)" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none font-bold">
                <option value="all">All Exams</option>
                <template x-for="f in corpusFilters" :key="f.id">
                    <option :value="f.id" x-text="f.name"></option>
                </template>
            </select>
        </div>
    </div>

    <div x-show="corpusLoading" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex items-center justify-center rounded-2xl">
        <svg class="animate-spin h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <div class="space-y-4">
        <template x-if="corpusData.sentences && corpusData.sentences.length === 0 && !corpusLoading">
            <div class="text-center py-10 text-slate-500 font-medium">No sentences found for this filter.</div>
        </template>

        <template x-for="sentence in corpusData.sentences" :key="sentence.id">
            <div @click="openPassage(sentence.section_id, sentence.id)" 
                 class="group relative bg-slate-50 hover:bg-indigo-50 cursor-pointer transition-colors p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow">
                
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span class="bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded shadow-sm" x-text="sentence.exam_type"></span>
                        <span class="bg-slate-200 text-slate-700 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded shadow-sm" x-text="sentence.exam"></span>
                        <span class="text-slate-400 text-xs font-medium" x-text="sentence.section"></span>
                    </div>
                    <span class="text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs font-bold flex items-center gap-1">
                        Read Full Passage <span>&rarr;</span>
                    </span>
                </div>
                
                <p class="txt-corp-en text-slate-800" x-html="highlightWord(sentence.text, sentence.word_form)"></p>
            </div>
        </template>
    </div>

    <div x-show="corpusData.total_pages > 1" class="mt-8 flex items-center justify-between border-t border-slate-100 pt-4">
        <span class="text-sm text-slate-500 font-medium">
            Showing <span class="font-bold text-slate-900" x-text="corpusData.sentences ? corpusData.sentences.length : 0"></span> of <span class="font-bold text-slate-900" x-text="corpusData.total_items"></span> results
        </span>
        
        <div class="flex gap-2">
            <button @click="fetchCorpus(corpusData.current_page - 1)" :disabled="corpusData.current_page === 1" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition">
                Prev
            </button>
            <span class="px-4 py-2 text-sm font-bold text-indigo-600 bg-indigo-50 rounded-lg">
                Page <span x-text="corpusData.current_page"></span> / <span x-text="corpusData.total_pages"></span>
            </span>
            <button @click="fetchCorpus(corpusData.current_page + 1)" :disabled="corpusData.current_page === corpusData.total_pages" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition">
                Next
            </button>
        </div>
    </div>
</div>
