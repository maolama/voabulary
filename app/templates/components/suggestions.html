{% if suggestions %}
<div class="absolute z-50 w-full bg-white rounded-xl shadow-2xl border border-slate-100 top-full mt-2 overflow-hidden animate-fade-in-up">
    <ul class="divide-y divide-slate-50">
        {% for word in suggestions %}
        <li>
            <button type="button" 
                    class="w-full text-left px-6 py-3 hover:bg-indigo-50 hover:text-indigo-700 text-slate-700 transition-colors flex items-center space-x-3"
                    onclick="document.getElementById('search-input').value = '{{ word }}'; document.getElementById('suggestions-container').innerHTML = ''; htmx.trigger('#search-form', 'submit');">
                <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="font-medium">{{ word }}</span>
            </button>
        </li>
        {% endfor %}
    </ul>
</div>
{% endif %}
