{% extends "base.html" %}
{% block content %}

<div x-data="dashboardLogic()" class="h-full">

    <div class="border-b border-slate-200 mb-6">
        <nav class="-mb-px flex space-x-8">
            <button @click="activeTab = 'overview'" 
                    :class="activeTab === 'overview' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'"
                    class="whitespace-nowrap pb-4 px-1 border-b-2 font-bold text-lg transition flex items-center gap-2">
                📊 Overview
            </button>
            <button @click="activeTab = 'corpus'" 
                    :class="activeTab === 'corpus' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'"
                    class="whitespace-nowrap pb-4 px-1 border-b-2 font-bold text-lg transition flex items-center gap-2">
                🗄️ Academic Corpus Explorer
            </button>
            <button @click="activeTab = 'analytics'" 
                    :class="activeTab === 'analytics' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'"
                    class="whitespace-nowrap pb-4 px-1 border-b-2 font-bold text-lg transition flex items-center gap-2">
                📈 Corpus Analytics
            </button>
        </nav>
    </div>

    <div x-show="activeTab === 'overview'" x-transition.opacity.duration.300ms>
        {% include '_dashboard_overview.html' %}
    </div>

    <div x-show="activeTab === 'corpus'" x-cloak class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[750px] animate-fade-in-up overflow-hidden relative">
        {% include '_corpus_explorer.html' %}
    </div>

    <div x-show="activeTab === 'analytics'" x-cloak class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[750px] animate-fade-in-up overflow-hidden relative">
        {% include '_corpus_analytics.html' %}
    </div>

    {% include '_dictionary_modal.html' %}

</div>

<script>
window.manualToggle = function(dictName, btn) {
    const iframe = document.getElementById('iframe-' + dictName);
    const currentMode = btn.getAttribute('data-mode');
    const newMode = (currentMode === 'full') ? 'pinned' : 'full';
    
    if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'setFilterMode', mode: newMode }, '*');
        btn.setAttribute('data-mode', newMode);
        if (newMode === 'pinned') {
            btn.innerText = '🔍 SHOW FULL ENTRY';
            btn.style.backgroundColor = '#ffffff'; btn.style.color = '#1e293b'; btn.style.borderColor = '#94a3b8';   
        } else {
            btn.innerText = '🎯 SHOW PINNED ONLY';
            btn.style.backgroundColor = '#e0e7ff'; btn.style.color = '#3730a3'; btn.style.borderColor = '#c7d2fe';   
        }
    }
};

window.addEventListener('message', function(event) {
    if (event.data.type === 'resize') {
        const iframe = document.getElementById('iframe-' + event.data.dict);
        if (iframe) {
            setTimeout(() => { iframe.style.height = (event.data.height + 50) + 'px'; }, 50);
        }
    }
});

document.addEventListener('alpine:init', () => {
    Alpine.data('dashboardLogic', () => ({
        activeTab: 'overview',
        vacationMode: {{ 'true' if profile.vacation_mode else 'false' }},

        // Corpus Explorer State
        hierarchy: [],
        availableExams: [],
        selectedExamType: '',
        selectedExamTypeName: '',
        selectedExam: '',
        selectedSectionId: null,
        sectionData: { sections: [], current_page: 1, total_pages: 1 },
        loadingSections: false,
        activePassageName: '',
        activePassageText: null,
        loadingText: false,

        // NEW: X-Ray State
        xRayMode: false,
        cefrMapping: {},

        // Analytics State
        analyticsSubjects: [],
        analyticsHierarchy: [],
        analyticsAvailableExams: [],
        analyticsFilters: { subject_id: '', exam_type_id: '', exam_id: '' },
        analyticsData: { words: [], current_page: 1, total_pages: 1, total_items: 0 },
        loadingAnalytics: false,

        // THE MASTER MODAL STATE (Frictionless Reading + Rabbit Hole)
        dictionaryModalOpen: false,
        modalTab: 'dictionary', // 'dictionary', 'context', 'collocations'
        selectedWord: '',
        isModalLoading: false,
        historyStack: [], // The Rabbit Hole Stack

        contextData: { sentences: [] },
        collocationData: [],

        settings: { font: '"Times New Roman", Times, serif', size: 18, weight: '400', italic: false },

        init() {
            this.fetchHierarchy();
            this.fetchAnalyticsFilters();
            this.fetchFrequencies(1);
            
            // NEW: Catch URL parameters from "Open in Explorer" clicks
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('tab') === 'corpus') {
                this.activeTab = 'corpus';
                const secId = urlParams.get('section_id');
                const secName = urlParams.get('name') || 'Reading Passage';
                if (secId) {
                    this.fetchPassageText(secId, secName);
                }
            }
            
            const savedTheme = localStorage.getItem('empire_dashboard_theme');
            if (savedTheme) this.settings = { ...this.settings, ...JSON.parse(savedTheme) };

            this.$watch('settings', (val) => {
                localStorage.setItem('empire_dashboard_theme', JSON.stringify(val));
            }, { deep: true });
        },

        async toggleVacation() {
            await fetch('/api/user/settings', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vacation_mode: this.vacationMode })
            });
            window.location.reload(); 
        },

        // --- EXPLORER API ---
        async fetchHierarchy() {
            try {
                const res = await fetch('/api/corpus/explorer/hierarchy');
                const json = await res.json();
                if (json.status === 'success') this.hierarchy = json.data;
            } catch (e) {}
        },

        examTypeChanged() {
            this.selectedExam = '';
            this.sectionData.sections = [];
            this.activePassageText = null;
            this.selectedSectionId = null;

            const typeObj = this.hierarchy.find(t => t.id == this.selectedExamType);
            if (typeObj) {
                this.availableExams = typeObj.exams;
                this.selectedExamTypeName = typeObj.name;
            } else {
                this.availableExams = [];
                this.selectedExamTypeName = '';
            }
        },

        async fetchSections(page) {
            if (!this.selectedExam) return;
            this.loadingSections = true;
            try {
                const res = await fetch(`/api/corpus/explorer/sections?exam_id=${this.selectedExam}&page=${page}`);
                const json = await res.json();
                if (json.status === 'success') this.sectionData = json.data;
            } catch (e) {}
            finally { this.loadingSections = false; }
        },

        async fetchPassageText(sectionId, sectionName) {
            this.selectedSectionId = sectionId;
            this.activePassageName = sectionName;
            this.loadingText = true;
            try {
                const res = await fetch(`/api/corpus/passage/${sectionId}`);
                const json = await res.json();
                
                // We no longer check sentences.length, we just grab the full_text
                if (json.status === 'success') {
                    this.cefrMapping = json.data.cefr_mapping || {}; 
                    this.activePassageText = json.data.full_text; // ⬅️ THIS RESTORES PARAGRAPHS
                }
            } catch (e) {}
            finally { this.loadingText = false; }
        },

        // --- ANALYTICS API ---
        async fetchAnalyticsFilters() {
            try {
                const res = await fetch('/api/corpus/analytics/filters');
                const json = await res.json();
                if (json.status === 'success') {
                    this.analyticsSubjects = json.data.subjects;
                    this.analyticsHierarchy = json.data.hierarchy;
                }
            } catch (e) {}
        },

        analyticsExamTypeChanged() {
            this.analyticsFilters.exam_id = '';
            const typeObj = this.analyticsHierarchy.find(t => t.id == this.analyticsFilters.exam_type_id);
            this.analyticsAvailableExams = typeObj ? typeObj.exams : [];
            this.fetchFrequencies(1);
        },

        resetAnalyticsFilters() {
            this.analyticsFilters = { subject_id: '', exam_type_id: '', exam_id: '' };
            this.analyticsAvailableExams = [];
            this.fetchFrequencies(1);
        },

        async fetchFrequencies(page) {
            this.loadingAnalytics = true;
            try {
                const queryParams = new URLSearchParams({
                    page: page,
                    subject_id: this.analyticsFilters.subject_id,
                    exam_type_id: this.analyticsFilters.exam_type_id,
                    exam_id: this.analyticsFilters.exam_id
                });
                const res = await fetch(`/api/corpus/analytics/frequencies?${queryParams.toString()}`);
                const json = await res.json();
                if (json.status === 'success') {
                    this.analyticsData = json.data;
                }
            } catch (e) {}
            finally { this.loadingAnalytics = false; }
        },

        // --- THE WORD MASTER ENGINE (Frictionless Reading & Dictionary) ---
        
        // --- FRICTIONLESS READING (TEXT PARSING & CLICK EVENTS) ---
        
        // --- FRICTIONLESS READING (TEXT PARSING & CLICK EVENTS) ---
        
        renderClickableText(text) {
            if (!text) return '';
            
            return text.replace(/\b([a-zA-Z]+(?:'[a-zA-Z]+)?)\b/g, (match) => {
                const cleanWord = match.toLowerCase();
                
                let extraClasses = 'text-slate-800'; 
                let tooltipAttr = ''; // NEW: Tooltip attribute
                
                // If X-Ray is ON and we have a difficulty rating for this word
                if (this.xRayMode && this.cefrMapping[cleanWord]) {
                    const lvl = this.cefrMapping[cleanWord].toUpperCase();
                    
                    // Set the native browser tooltip (appears after ~1s hover)
                    tooltipAttr = `title="CEFR Level: ${lvl}"`;
                    
                    if (lvl === 'A1') {
                        extraClasses += ' bg-emerald-200/40'; 
                    } else if (lvl === 'A2') {
                        extraClasses += ' bg-emerald-300/50'; 
                    } else if (lvl === 'B1') {
                        extraClasses += ' bg-amber-200/50'; 
                    } else if (lvl === 'B2') {
                        extraClasses += ' bg-amber-300/60'; 
                    } else if (lvl === 'C1') {
                        extraClasses += ' bg-rose-300/50'; 
                    } else if (lvl === 'C2') {
                        extraClasses += ' bg-rose-400/60'; 
                    }
                }
                
                // Inject the tooltipAttr into the span
                return `<span ${tooltipAttr} class="clickable-word cursor-pointer hover:bg-indigo-100 hover:text-indigo-800 rounded-sm px-0.5 transition-colors ${extraClasses}">${match}</span>`;
            });
        },

        highlightWord(text, wordForm) {
            if (!text || !wordForm) return text;
            const regex = new RegExp(`\\b(${wordForm})\\b`, 'gi');
            return text.replace(regex, '<span class="bg-amber-200 text-amber-900 font-bold px-1 rounded">$1</span>');
        },

        async handleWordClick(event) {
            if (event.target.tagName.toLowerCase() === 'span' && event.target.classList.contains('clickable-word')) {
                const rawWord = event.target.innerText.trim();
                const cleanWord = rawWord.replace(/[^a-zA-Z]/g, '').toLowerCase(); 
                
                if (cleanWord) {
                    this.dictionaryModalOpen = true;
                    this.isModalLoading = true;
                    this.selectedWord = cleanWord;
                    
                    let finalWord = cleanWord;
                    try {
                        const res = await fetch(`/api/corpus/lemma?word=${cleanWord}`);
                        const json = await res.json();
                        if (json.status === 'success' && json.lemma) finalWord = json.lemma;
                    } catch (e) { }
                    
                    this.openWordMaster(finalWord, true);
                }
            }
        },

        async openWordMaster(word, pushToStack = true) {
            word = word.toLowerCase();
            
            // Manage the Stack History
            if (pushToStack && this.selectedWord && this.selectedWord !== word) {
                this.historyStack.push({ word: this.selectedWord, tab: this.modalTab });
            }

            this.selectedWord = word;
            this.dictionaryModalOpen = true;
            this.isModalLoading = true;
            
            // 1. Fetch Dictionary
            const contentDiv = document.getElementById('modal-dict-content');
            try {
                const formData = new FormData();
                formData.append('query', word);
                const response = await fetch('/api/search', { method: 'POST', body: formData });
                contentDiv.innerHTML = await response.text();
                if (window.htmx) htmx.process(contentDiv);
            } catch (error) {
                contentDiv.innerHTML = '<p class="text-center text-rose-500 font-bold mt-10">Failed to load dictionary.</p>';
            }

            // 2. Fetch Real Context (passing active analytics filters)
            try {
                const queryParams = new URLSearchParams({
                    word: word,
                    subject_id: this.analyticsFilters.subject_id,
                    exam_type_id: this.analyticsFilters.exam_type_id,
                    exam_id: this.analyticsFilters.exam_id,
                    per_page: 20
                });
                const ctxRes = await fetch(`/api/corpus/sentences?${queryParams.toString()}`);
                const ctxJson = await ctxRes.json();
                if (ctxJson.status === 'success') this.contextData = ctxJson.data;
            } catch (error) { this.contextData = { sentences: [] }; }

            // 3. Fetch Collocations
            try {
                const colRes = await fetch(`/api/corpus/analytics/collocations?word=${word}`);
                const colJson = await colRes.json();
                if (colJson.status === 'success') this.collocationData = colJson.data;
            } catch (error) { this.collocationData = []; }

            this.isModalLoading = false;
        },

        goBackInHistory() {
            if (this.historyStack.length === 0) return;
            const previousState = this.historyStack.pop();
            this.modalTab = previousState.tab;
            this.openWordMaster(previousState.word, false); // False = don't push the current state to stack
        },

        closeDictionaryPopup() {
            this.dictionaryModalOpen = false;
            this.selectedWord = '';
            this.historyStack = [];
            setTimeout(() => { document.getElementById('modal-dict-content').innerHTML = ''; }, 300);
        },

        // --- FLASHCARD GENERATOR ---
        async stealSentence(sentenceText, btnElement) {
            try {
                const response = await fetch('/api/corpus/steal_sentence', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: this.selectedWord, sentence: sentenceText })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    btnElement.innerText = '✅ Saved to Empire';
                    btnElement.classList.replace('text-emerald-600', 'text-white');
                    btnElement.classList.replace('bg-emerald-50', 'bg-emerald-500');
                } else {
                    alert(data.message); // E.g., "Add word to empire first"
                }
            } catch (e) {
                alert("Error connecting to server.");
            }
        },

        readFullPassage(sectionId, sectionName) {
            this.closeDictionaryPopup();
            this.activeTab = 'corpus';
            this.fetchPassageText(sectionId, sectionName);
        },
        
        // This is necessary if they trigger openDictionaryPopup from the Analytics Grid
        openDictionaryPopup(word) {
            this.openWordMaster(word, true);
        }
    }));
});
</script>
{% endblock %}
