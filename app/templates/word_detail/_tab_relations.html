<div x-show="activeTab === 'relations'" x-cloak class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="text-xl font-bold text-emerald-700 mb-4 flex items-center">Synonyms</h3>
        <form @submit.prevent="addRelation('synonym')" class="flex mb-4">
            <input type="text" x-model="newSynonym" placeholder="Add synonym..." class="flex-grow bg-slate-50 border border-slate-200 rounded-l-lg px-4 py-2 focus:outline-none focus:border-emerald-500">
            <button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded-r-lg font-bold hover:bg-emerald-700 transition">+</button>
        </form>
        <div class="flex flex-wrap gap-2">
            <template x-for="item in manualSynonyms" :key="item.id">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-emerald-100 text-emerald-800 border border-emerald-200 shadow-sm">
                    <span x-text="item.word"></span>
                    <button @click="deleteRelation('synonym', item.id)" class="ml-1.5 text-emerald-600 hover:text-rose-600 focus:outline-none">✕</button>
                </span>
            </template>
            <template x-for="word in autoSynonyms" :key="word">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600 border border-slate-200 opacity-80"><span x-text="word"></span></span>
            </template>
        </div>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="text-xl font-bold text-rose-700 mb-4 flex items-center">Antonyms</h3>
        <form @submit.prevent="addRelation('antonym')" class="flex mb-4">
            <input type="text" x-model="newAntonym" placeholder="Add antonym..." class="flex-grow bg-slate-50 border border-slate-200 rounded-l-lg px-4 py-2 focus:outline-none focus:border-rose-500">
            <button type="submit" class="bg-rose-600 text-white px-4 py-2 rounded-r-lg font-bold hover:bg-rose-700 transition">+</button>
        </form>
        <div class="flex flex-wrap gap-2">
            <template x-for="item in manualAntonyms" :key="item.id">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-rose-100 text-rose-800 border border-rose-200 shadow-sm">
                    <span x-text="item.word"></span>
                    <button @click="deleteRelation('antonym', item.id)" class="ml-1.5 text-rose-600 hover:text-rose-900 focus:outline-none">✕</button>
                </span>
            </template>
            <template x-for="word in autoAntonyms" :key="word">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600 border border-slate-200 opacity-80"><span x-text="word"></span></span>
            </template>
        </div>
    </div>
</div>
