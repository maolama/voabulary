{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto mt-12 text-center">
    <div class="mb-4 text-left"><a href="/games" class="text-indigo-600 font-bold">&larr; Hub</a></div>
    
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-200">
        <div class="text-sm font-bold text-indigo-500 uppercase tracking-widest mb-6">Audio Match</div>
        
        <button onclick="playTargetAudio()" class="bg-indigo-600 hover:bg-indigo-700 text-white p-8 rounded-full shadow-xl transition transform hover:scale-110 mb-12 animate-pulse">
            <svg class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M12 18V6a2 2 0 00-2.24-1.984l-5 1A2 2 0 003 7v10a2 2 0 001.76 1.984l5 1A2 2 0 0012 18z" />
            </svg>
        </button>

        <div class="grid grid-cols-2 gap-4">
            {% for opt in options %}
            <form hx-post="/games/audio_match/submit/{{ opt.id }}/{{ target.id }}" hx-target="#feedback">
                <button type="submit" class="w-full bg-slate-50 hover:bg-indigo-50 border-2 border-slate-200 hover:border-indigo-500 text-slate-800 font-bold py-6 rounded-2xl text-2xl transition">
                    {{ opt.word }}
                </button>
            </form>
            {% endfor %}
        </div>

        <div id="feedback" class="mt-6 h-12"></div>
    </div>
</div>

<script>
    function playTargetAudio() {
        {% if use_tts %}
            const utterance = new SpeechSynthesisUtterance('{{ target.word }}');
            window.speechSynthesis.speak(utterance);
        {% else %}
            new Audio('{{ audio_path }}').play();
        {% endif %}
    }
    window.onload = () => { setTimeout(playTargetAudio, 300); };
</script>
{% endblock %}
