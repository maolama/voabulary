{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto mt-12 text-center">
    <div class="mb-4 text-left"><a href="/games" class="text-indigo-600 font-bold">&larr; Hub</a></div>
    
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-200">
        <div class="text-sm font-bold text-indigo-500 uppercase tracking-widest mb-2">Missing Vowels</div>
        
        <div class="bg-slate-50 border border-slate-200 p-6 rounded-xl mb-8 italic text-slate-600">
            Hint: "{{ hint }}"
        </div>

        <h2 class="text-5xl font-mono font-black tracking-[0.5em] text-slate-800 mb-12">{{ vowelless }}</h2>

        <form hx-post="/games/missing_vowels/submit/{{ word.id }}" hx-target="#feedback" class="max-w-sm mx-auto">
            <input type="text" name="typed_word" autocomplete="off" autofocus required
                   class="w-full text-center text-2xl font-bold border-b-4 border-slate-300 focus:border-indigo-500 focus:outline-none py-2 bg-transparent transition-colors mb-6"
                   placeholder="Type full word...">
            <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800">Check</button>
        </form>

        <div id="feedback" class="mt-6 h-12"></div>
    </div>
</div>
{% endblock %}
