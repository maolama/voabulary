{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto mt-16 perspective-1000">
    <div class="mb-4"><a href="/games" class="text-indigo-600 font-bold">&larr; Exit to Hub</a></div>
    
    <div id="flashcard" class="bg-white p-12 rounded-3xl shadow-2xl border border-slate-200 text-center animate-fade-in-up">
        <h2 class="text-5xl font-black text-slate-900 mb-10 tracking-tight">{{ word.word }}</h2>
        
        <form hx-post="/games/sprint/flip/{{ word.id }}" hx-target="#flashcard" hx-swap="outerHTML">
            <button type="submit" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-bold py-3 px-8 rounded-full shadow transition w-full">
                Tap to Flip
            </button>
        </form>
    </div>
</div>
{% endblock %}
