{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto mt-12 text-center">
    
    {% if not word %}
    <div class="bg-slate-100 p-8 rounded-2xl">
        <h2 class="text-2xl font-bold text-slate-700 mb-4">No words to practice!</h2>
        <a href="/search" class="text-indigo-600 font-bold hover:underline">Go add some words to your Empire.</a>
    </div>
    {% else %}
    
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-200">
        <div class="mb-2 text-sm font-bold text-indigo-500 uppercase tracking-widest">Scramble Dictation</div>
        <p class="text-slate-500 mb-8">Listen to the audio and unscramble the letters.</p>
        
        <button onclick="window.playTTSAudio('{{ word.word }}')" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 p-6 rounded-full shadow-inner transition transform hover:scale-110 mb-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M12 18V6a2 2 0 00-2.24-1.984l-5 1A2 2 0 003 7v10a2 2 0 001.76 1.984l5 1A2 2 0 0012 18z" />
            </svg>
        </button>

        <div class="flex flex-wrap justify-center gap-3 mb-10">
            {% for char in scrambled %}
            <div class="bg-slate-800 text-white text-3xl font-black w-14 h-14 flex items-center justify-center rounded-lg shadow uppercase">
                {{ char }}
            </div>
            {% endfor %}
        </div>

        <form hx-post="/api/submit_scramble/{{ word.id }}" hx-target="#scramble-feedback" hx-swap="innerHTML" class="max-w-sm mx-auto">
            <input type="text" name="typed_word" id="typed_word" autocomplete="off" autofocus required
                   class="w-full text-center text-3xl font-bold border-b-4 border-slate-300 focus:border-indigo-500 focus:outline-none py-2 bg-transparent transition-colors uppercase"
                   placeholder="Type answer...">
            <button type="submit" class="hidden">Submit</button>
        </form>

        <div id="scramble-feedback" class="mt-8 h-20"></div>
    </div>

    <script>
        window.onload = () => { setTimeout(() => window.playTTSAudio('{{ word.word }}', 0.85), 300); };
    </script>
    {% endif %}
</div>
{% endblock %}
